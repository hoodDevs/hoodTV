kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "cd /home/runner/workspace && PORT=8080 uv run python artifacts/api-server-py/main.py"

[services.production]
build = ["bash", "-c", "UV_PROJECT_ENVIRONMENT=.venv UV_CACHE_DIR=/home/runner/.uv-cache uv sync --no-dev"]

[services.production.run]
args = ["bash", "-c", "cd /home/runner/workspace && .venv/bin/python artifacts/api-server-py/main.py"]

[services.production.run.env]
PORT = "8080"
UV_PROJECT_ENVIRONMENT = ".venv"

[services.production.health.startup]
path = "/api/healthz"
