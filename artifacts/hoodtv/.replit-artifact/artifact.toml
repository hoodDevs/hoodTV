kind = "web"
previewPath = "/"
title = "hoodTV"
version = "1.0.0"
id = "artifacts/hoodtv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20820

[services.development]
run = "pnpm --filter @workspace/hoodtv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hoodtv", "run", "build" ]
publicDir = "artifacts/hoodtv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20820"
BASE_PATH = "/"
